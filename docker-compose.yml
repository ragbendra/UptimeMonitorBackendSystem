services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  scheduler:
    build: .
    command: python -m workers.scheduler
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  check_worker:
    build: .
    command: python -m workers.check_worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  alert_worker:
    build: .
    command: python -m workers.alert_worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: uptime_monitor
      POSTGRES_USER: uptime
      POSTGRES_PASSWORD: uptime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:

