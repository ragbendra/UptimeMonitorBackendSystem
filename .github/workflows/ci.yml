name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python imports
        env:
          DATABASE_URL: postgresql+asyncpg://uptime:uptime@localhost:5432/uptime_monitor
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret
          JWT_EXPIRE_MINUTES: "60"
          SMTP_HOST: localhost
          SMTP_PORT: "1025"
          SMTP_USERNAME: ""
          SMTP_PASSWORD: ""
          SMTP_FROM_EMAIL: alerts@example.com
          SMTP_USE_TLS: "false"
        run: python -m compileall app alembic workers

      - name: Check migration SQL
        env:
          DATABASE_URL: postgresql+asyncpg://uptime:uptime@localhost:5432/uptime_monitor
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret
          JWT_EXPIRE_MINUTES: "60"
          SMTP_HOST: localhost
          SMTP_PORT: "1025"
          SMTP_USERNAME: ""
          SMTP_PASSWORD: ""
          SMTP_FROM_EMAIL: alerts@example.com
          SMTP_USE_TLS: "false"
        run: alembic upgrade head --sql

      - name: Check Docker Compose config
        run: docker compose config
